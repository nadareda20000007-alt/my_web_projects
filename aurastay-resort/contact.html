<section class="inquiry-hero">

  <div class="inquiry-hero-inner">
    <p class="eyebrow">Book an Inquiry</p>
  </div>
</section>

  <section class="section section--sand">
    <div class="wrap contact-grid">

      <div class="reveal">

      <form class="inquiry-form" id="inquiry-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="d5903ab1-0819-4766-92a7-3bb84f823677">
          <input type="hidden" name="subject" value="New AuraStay Inquiry">
          <input type="checkbox" name="botcheck" class="sr-only" style="display:none;">

          <div class="field">
              <label for="full-name">Full Name</label>
              <input id="full-name" name="name" type="text" required autocomplete="name" placeholder="enter your name">
          </div>
          <div class="field">
              <label for="email">Email Address</label>
              <input id="email" name="email" type="email" required autocomplete="email" placeholder="enter your email">
          </div>
          <div class="field field select-wrap">
              <label for="villa-type">Desired Villa</label>
              <select id="villa-type" name="villa_type" required>
                  <option value="" disabled selected>Choose a villa</option>
                  <option value="The Canopy Suite">The Canopy Suite</option>
                  <option value="The Oasis Villa">The Oasis Villa</option>
                  <option value="Undecided">Not sure yet</option>
              </select>
          </div>
          <div class="field">
              <label for="requests">Special Requests</label>
              <textarea id="requests" name="requests" placeholder="Dates, occasion, dietary needs, accessibility — anything we should know."></textarea>
          </div>
          <button type="submit" class="btn btn-solid">Submit Request</button>
          <p class="form-status" role="status" aria-live="polite"></p>
      </form>
      
      </div>
